<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MD Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      max-width: 800px;
      margin: 60px auto;
      padding: 0 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
      color: #24292e;
    }
    pre {
      background: #f6f8fa;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
    }
    code {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.9em;
    }
    p > code {
      background: #f6f8fa;
      padding: 2px 5px;
      border-radius: 4px;
    }
    blockquote {
      border-left: 4px solid #dfe2e5;
      margin: 0;
      padding-left: 16px;
      color: #6a737d;
    }
    table {
      border-collapse: collapse;
      width: 100%;
    }
    th, td {
      border: 1px solid #dfe2e5;
      padding: 8px 12px;
    }
    th { background: #f6f8fa; }
    #error { color: #cb2431; }
  </style>
</head>
<body>
  <div id="content">載入中...</div>
  <script>
    const params = new URLSearchParams(location.search);
    const file = params.get("file");

    if (!file) {
      document.getElementById("content").innerHTML =
        '<p id="error">請在 URL 加上 <code>?file=your-file.md</code></p>';
    } else {
      const base = location.href.replace(/\/viewer\.html.*$/, "");
      fetch(`${base}/${file}`)
        .then((r) => {
          if (!r.ok) throw new Error(`找不到檔案：${file}`);
          return r.text();
        })
        .then((md) => {
          document.title = file;
          document.getElementById("content").innerHTML = marked.parse(md);
        })
        .catch((e) => {
          document.getElementById("content").innerHTML =
            `<p id="error">${e.message}</p>`;
        });
    }
  </script>
</body>
</html>
